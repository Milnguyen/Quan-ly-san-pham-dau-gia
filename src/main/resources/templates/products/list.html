<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm đấu giá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">
    <div class="card p-4 shadow border-0">

        <h2 class="text-center mb-4 fw-bold text-primary">
            QUẢN LÝ SẢN PHẨM ĐẤU GIÁ
        </h2>

        <form th:action="@{/products}" method="get">
            <div class="row mb-3">
                <div class="col-md-3">
                    <input type="text"
                           class="form-control"
                           name="name"
                           placeholder="Tên sản phẩm..."
                           th:value="${name}">
                </div>

                <div class="col-md-3">
                    <input type="number"
                           class="form-control"
                           name="price"
                           min="0"
                           step="1000"
                           placeholder="Giá khởi điểm"
                           th:value="${price}">
                </div>

                <div class="col-md-3">
                    <select class="form-select" name="categoryId">
                        <option value="">Loại sản phẩm</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${categoryId == c.id}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        Tìm kiếm
                    </button>

                    <a th:href="@{/products}" class="btn btn-secondary flex-fill">
                        Xóa nhập
                    </a>
                </div>
            </div>
        </form>

        <div class="mb-3">
            <a th:href="@{/products/create}" class="btn btn-success">
                Thêm sản phẩm
            </a>
        </div>

        <form th:action="@{/products/delete}"
              method="post"
              onsubmit="return confirm('Bạn có muốn xóa tất cả sản phẩm đã chọn?')">

            <table class="table table-bordered table-hover align-middle bg-white">
                <thead class="table-dark">
                <tr>
                    <th>STT</th>
                    <th>Chọn</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá khởi điểm</th>
                    <th>Loại sản phẩm</th>
                    <th>Tình trạng</th>
                    <th>Sửa</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p, iter : ${products.content}">
                    <td th:text="${products.number * products.size + iter.index + 1}"></td>

                    <td>
                        <input class="form-check-input"
                               type="checkbox"
                               name="selectedIds"
                               th:value="${p.id}">
                    </td>

                    <td th:text="${p.name}"></td>

                    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>

                    <td th:text="${p.category.name}"></td>

                    <td>
                        <span class="badge bg-warning text-dark"
                              th:if="${#strings.contains(p.status, 'Đang')}"
                              th:text="${p.status}">
                        </span>

                        <span class="badge bg-danger"
                              th:if="${#strings.contains(p.status, 'Đã')}"
                              th:text="${p.status}">
                        </span>

                        <span class="badge bg-success"
                              th:if="${!#strings.contains(p.status, 'Đang') and !#strings.contains(p.status, 'Đã')}"
                              th:text="${p.status}">
                        </span>
                    </td>

                    <td>
                        <a class="btn btn-warning btn-sm"
                           th:href="@{/products/edit/{id}(id=${p.id})}">
                            Sửa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <button type="submit" class="btn btn-danger">
                Xóa sản phẩm đã chọn
            </button>
        </form>

        <nav class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item"
                    th:classappend="${!products.hasPrevious()} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products(page=${products.number - 1}, name=${name}, price=${price}, categoryId=${categoryId})}">
                        Previous
                    </a>
                </li>

                <li class="page-item active">
                    <span class="page-link" th:text="${products.number + 1}"></span>
                </li>

                <li class="page-item"
                    th:classappend="${!products.hasNext()} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products(page=${products.number + 1}, name=${name}, price=${price}, categoryId=${categoryId})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>

    </div>
</div>

</body>
</html>
