<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa sản phẩm đấu giá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #eef2f7;
        }

        .card {
            border-radius: 18px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow border-0 p-5 mx-auto" style="max-width: 700px;">

        <h2 class="text-center text-primary fw-bold mb-4">
            SỬA SẢN PHẨM ĐẤU GIÁ
        </h2>

        <form th:action="@{/products/update}"
              th:object="${product}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Tên sản phẩm
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Giá khởi điểm
                </label>

                <input type="number"
                       class="form-control"
                       th:field="*{price}"
                       min="100000"
                       step="1000"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Loại sản phẩm
                </label>

                <select class="form-select"
                        th:field="*{category.id}"
                        required>

                    <option value="">
                        -- Chọn loại sản phẩm --
                    </option>

                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>

                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Tình trạng
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{status}"
                       required>
            </div>

            <div class="text-center">

                <button type="submit" class="btn btn-primary px-4">
                    Cập nhật sản phẩm
                </button>

                <a th:href="@{/products}"
                   class="btn btn-secondary px-4 ms-2">
                    Quay lại
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
